name: Deploy static content to Pages

# Also fires after update-data.yml or update-youtube-videos.yml pushes
# fresh data to main, since those use a PAT (SYNC_TOKEN) rather than the
# default GITHUB_TOKEN — pushes made with a PAT do trigger other
# workflows, unlike the default token's anti-loop-protected push.
on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let an in-flight one finish rather than
# cancel it, so a fast-following data-sync commit doesn't clobber it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - id: deployment
        uses: actions/deploy-pages@v4
