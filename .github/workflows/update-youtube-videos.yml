name: Update YouTube Videos

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# GITHUB_TOKEN only needs to read; the commit/push step below authenticates
# with SYNC_TOKEN (a PAT), not the default token.
permissions:
  contents: read

jobs:
  update-youtube-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest videos (Workshops, Developer Exchange, Public Call, Demos and per-project playlists)
        run: node scripts/fetch-youtube-playlists.js

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/youtube-playlists.json
          git diff --cached --quiet || git commit -m "Update YouTube videos"
          git push
